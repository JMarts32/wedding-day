<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f2e7"/>
      <stop offset="100%" style="stop-color:#ede8d8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Thin elegant border, double ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#9f978b" stroke-width="0.8" opacity="0.7"/>
  <circle cx="50" cy="50" r="43.5" fill="none" stroke="#9f978b" stroke-width="0.3" opacity="0.4"/>

  <!-- S&O in italic serif matching the page typography -->
  <text
    x="50"
    y="56"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="26"
    font-weight="400"
    font-style="italic"
    letter-spacing="1"
    fill="#60615d"
  >S&amp;O</text>
</svg>